name: Link Founder Agent

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to link-test (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: link-founder-agent
  cancel-in-progress: false

env:
  IMAGE_REPO: aos/founder-agent
  PORT: 8000

jobs:
  link:
    name: Link Test - ACI Runtime Verification
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set ACI name
        run: echo "ACI_NAME=founder-link-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image digest
        id: image
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          DIGEST=$(az acr manifest list-metadata \
            --registry ${{ vars.ACR_NAME }} \
            --name ${{ env.IMAGE_REPO }} \
            --orderby time_desc \
            --query "[?tags[?@ == '${TAG}']].digest | [0]" \
            --output tsv)
          if [ -z "${DIGEST}" ]; then
            echo "::error::No manifest found for ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:${TAG}"
            exit 1
          fi
          IMAGE_REF="${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}@${DIGEST}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Image: ${IMAGE_REF}"

      # -- Deploy ACI without public IP - exec works via Azure control plane ---
      - name: Deploy ACI link-test container
        run: |
          ACR_TOKEN=$(az acr login \
            --name ${{ vars.ACR_NAME }} \
            --expose-token \
            --query accessToken \
            --output tsv)

          az container create \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ env.ACI_NAME }} \
            --image ${{ steps.image.outputs.image_ref }} \
            --registry-login-server ${{ vars.ACR_NAME }}.azurecr.io \
            --registry-username 00000000-0000-0000-0000-000000000000 \
            --registry-password "${ACR_TOKEN}" \
            --assign-identity \
            --os-type Linux \
            --cpu 1 \
            --memory 2 \
            --restart-policy Never \
            --environment-variables \
              PYTHONPATH=/app:/app/lib/python3.12/site-packages \
              AGENT_PACKAGE=founder_agent \
              LOG_LEVEL=INFO \
              AGENT_ENTRY_POINT=default \
              AGENT_SERVICE_PORT=${{ env.PORT }}

          echo "ACI instance ${{ env.ACI_NAME }} created"

      # -- Wait for Running state --------------------------------------------
      - name: Wait for container running
        run: |
          echo "Waiting for container to reach Running state..."
          for i in $(seq 1 24); do
            STATE=$(az container show \
              --resource-group ${{ vars.RG_NAME }} \
              --name ${{ env.ACI_NAME }} \
              --query "containers[0].instanceView.currentState.state" \
              --output tsv 2>/dev/null)
            echo "  [${i}/24] state: ${STATE}"
            if [ "${STATE}" = "Running" ]; then
              echo "Container is Running"
              break
            fi
            if [ "${STATE}" = "Terminated" ]; then
              echo "::error::Container terminated unexpectedly"
              exit 1
            fi
            sleep 5
          done

      # -- Stream startup logs -----------------------------------------------
      - name: Stream startup logs
        run: |
          echo "=== Container startup logs ==="
          az container logs \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ env.ACI_NAME }} \
            2>/dev/null || echo "(no logs yet)"
          echo "=== End startup logs ==="

      # -- Runtime contract verification via exec ----------------------------
      # No public IP needed - runs directly inside the container
      - name: Verify FounderAgent routing contract
        id: contract
        run: |
          az container exec \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ env.ACI_NAME }} \
            --exec-command "python -c from founder_agent import FounderAgent; a = FounderAgent(); mro = [c.__name__ for c in a.__class__.__mro__]; print('MRO:', mro); assert a.get_default_routing_tag() == '[COMPLETE]'; assert '[ROUTE:CFO]' in a.get_routing_tags(); assert '[ROUTE:CMO]' in a.get_routing_tags(); assert '[HANDBACK]' not in a.get_routing_tags(); print('Routing contract: OK')"

      # -- Final log capture -------------------------------------------------
      - name: Capture final container logs
        if: always()
        run: |
          echo "=== Final container logs ==="
          az container logs \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ env.ACI_NAME }} \
            2>/dev/null || echo "(no logs available)"
          echo "=== End container logs ==="

      # -- Teardown - always runs --------------------------------------------
      - name: Delete ACI instance
        if: always()
        run: |
          az container delete \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ env.ACI_NAME }} \
            --yes \
            --no-wait \
            2>/dev/null || true
          echo "ACI instance ${{ env.ACI_NAME }} deletion initiated"

      - name: Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Founder Agent - Link Test
          | | |
          |--|--|
          | **Image** | ${{ steps.image.outputs.image_ref }} |
          | **ACI instance** | ${{ env.ACI_NAME }} |
          | **Contract check** | ${{ steps.contract.outcome }} |
          EOF
