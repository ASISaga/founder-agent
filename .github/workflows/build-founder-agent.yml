name: Build Founder Agent

on:
  push:
    branches: [main]
    paths:
      - "src/founder_agent/**"
      - "Dockerfile.aos-agent"
      - ".github/workflows/build-founder-agent.yml"
  repository_dispatch:
    types: [manifest-update]
  workflow_dispatch:

concurrency:
  group: founder-agent-build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    environment: staging
    uses: ASISaga/aos-infra/.github/workflows/aos-agent-build.yml@main
    with:
      trigger:        "${{ github.event_name == 'repository_dispatch' && 'rebase' || 'source-change' }}"
      layer_number:   "5"
      layer_name:     "founder-agent"
      image:          "aos/founder-agent"
      parent_image:   "${{ vars.AOS_BUSINESS_IMAGE }}"
      package_dir:    "Founder"
      package_module: "Founder"
      repo_name:      "ASISaga/founder-agent"
      src_path:       "src/Founder"
      parent_digest:  "${{ github.event.client_payload.parent_digest || '' }}"
      breaking_candidate: "${{ github.event.client_payload.breaking_candidate || 'false' }}"
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}

  deploy-to-foundry:
    name: Trigger Foundry deployment
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Trigger deploy-founder-foundry workflow
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          gh workflow run deploy-founder-foundry.yml \
            --repo ASISaga/founder-agent \
            --ref main
          echo "Triggered deploy-founder-foundry.yml"
