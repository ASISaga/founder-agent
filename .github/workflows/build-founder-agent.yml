name: Build Founder Agent

on:
  workflow_dispatch:

concurrency:
  group: founder-agent-build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    environment: staging
    uses: ASISaga/aos-infra/.github/workflows/aos-agent-build.yml@main
    with:
      trigger:        "${{ github.event_name == 'repository_dispatch' && 'rebase' || 'source-change' }}"
      layer_number:   "5"
      layer_name:     "founder-agent"
      image:          "aos/founder-agent"
      parent_image:   "${{ vars.AOS_BUSINESS_IMAGE }}"
      package_dir:    "Founder"
      package_module: "Founder"
      repo_name:      "ASISaga/founder-agent"
      src_path:       "src/Founder"
      parent_digest:  "${{ github.event.client_payload.parent_digest || '' }}"
      breaking_candidate: "${{ github.event.client_payload.breaking_candidate || 'false' }}"
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
