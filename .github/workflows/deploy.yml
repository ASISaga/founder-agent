name: Deploy Founder Agent

# Deploys the Founder agent to Azure AI Foundry as a hosted (containerised) agent.
#
# Job — deploy-hosted-agent (Azure CLI):
#   Builds the container image via ACR Tasks (no Docker required on runner),
#   creates a new agent version in Foundry, and starts it.
#   Required GitHub Environments: dev, staging, prod
#   Each environment needs the following secrets:
#     AZURE_CLIENT_ID       — Managed identity client ID for OIDC
#     AZURE_TENANT_ID       — Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   Configure the env vars below (ACR_NAME, FOUNDRY_HUB_NAME, etc.) for your project.
#
# Deployment triggers:
#   Push to main                    → dev
#   GitHub Release published        → prod
#   workflow_dispatch               → environment selected by user
#   repository_dispatch (infra_provisioned) → environment from payload

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | staging | prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

# Container deployment settings (used by deploy-hosted-agent job).
# Update these values for your project before enabling that job.
# AGENT_NAME uses a "BusinessInfinity-<repo>" convention; adjust the prefix as needed.
env:
  AGENT_NAME: "${{ vars.APP_NAME }}-${{ github.event.repository.name }}"

  # Pulling from GitHub Settings > Variables

  # The name of your Azure Container Registry (e.g., 'asiacr') where the agent's Docker image is stored.
  ACR_NAME: ${{ vars.ACR_NAME }}

  # The name of your Azure AI Foundry Hub/Account (the top-level resource for your AI assets).
  FOUNDRY_HUB_NAME: ${{ vars.FOUNDRY_HUB_NAME }}

  # The specific Azure AI Foundry Project where this agent will be provisioned and managed.
  FOUNDRY_PROJECT_NAME: ${{ vars.FOUNDRY_PROJECT_NAME }}

  # The Azure Resource Group containing your Foundry, ACR, and related boardroom infrastructure.
  RG_NAME: ${{ vars.RG_NAME }}
  
  AGENT_VERSION: ${{ vars.AGENT_VERSION }}

jobs:
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  deploy-hosted-agent:
    name: Build, Push & Deploy Hosted Agent
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        id: validate-config
        run: |
          missing=()
          [[ -z "$AZURE_CLIENT_ID" ]]       && missing+=("AZURE_CLIENT_ID secret")
          [[ -z "$AZURE_TENANT_ID" ]]       && missing+=("AZURE_TENANT_ID secret")
          [[ -z "$AZURE_SUBSCRIPTION_ID" ]] && missing+=("AZURE_SUBSCRIPTION_ID secret")
          [[ "$ACR_NAME"      == "your-acr-name"       ]] && missing+=("ACR_NAME env var")
          [[ "$FOUNDRY_HUB_NAME"  == "your-foundry-account" ]] && missing+=("FOUNDRY_HUB_NAME env var")
          [[ "$FOUNDRY_PROJECT_NAME"  == "your-foundry-project" ]] && missing+=("FOUNDRY_PROJECT_NAME env var")
          [[ "$RG_NAME"       == "your-resource-group"  ]] && missing+=("RG_NAME env var")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Deployment skipped — configure the following before enabling: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ACR_NAME:              ${{ env.ACR_NAME }}
          FOUNDRY_HUB_NAME:          ${{ env.FOUNDRY_HUB_NAME }}
          FOUNDRY_PROJECT_NAME:          ${{ env.FOUNDRY_PROJECT_NAME }}
          RG_NAME:               ${{ env.RG_NAME }}

      - name: Azure Login (OIDC)
        if: steps.validate-config.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push Image to ACR
        if: steps.validate-config.outputs.configured == 'true'
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.AGENT_NAME }}:${{ github.sha }} \
            --platform linux/amd64 \
            --build-arg GITHUB_TOKEN=${{ secrets.FOUNDER_GITHUB_TOKEN }} .

      - name: Create new agent version in Foundry
        if: steps.validate-config.outputs.configured == 'true'
        run: |
          az cognitiveservices agent create-version \
            --account-name ${{ env.FOUNDRY_HUB_NAME }} \
            --project-name ${{ env.FOUNDRY_PROJECT_NAME }} \
            --name ${{ env.AGENT_NAME }} \
            --image "${{ env.ACR_NAME }}.azurecr.io/${{ env.AGENT_NAME }}:${{ github.sha }}" \
            --agent-version ${{ env.AGENT_VERSION }}

      - name: Start the agent deployment
        if: steps.validate-config.outputs.configured == 'true'
        run: |
          az cognitiveservices agent start \
            --account-name ${{ env.FOUNDRY_HUB_NAME }} \
            --project-name ${{ env.FOUNDRY_PROJECT_NAME }} \
            --name ${{ env.AGENT_NAME }} \
            --agent-version ${{ env.AGENT_VERSION }} \
            --min-replicas 1 \
            --max-replicas 2
