name: Deploy Founder Agent

# Deploys the Founder agent to Azure AI Foundry as a hosted (containerised) agent.
#
# Job — deploy-hosted-agent (Azure CLI):
#   Builds the container image via ACR Tasks (no Docker required on runner),
#   creates a new agent version in Foundry, and starts it.
#   Required GitHub Environments: dev, staging, prod
#   Each environment needs the following secrets:
#     AZURE_CLIENT_ID       — Managed identity client ID for OIDC
#     AZURE_TENANT_ID       — Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   Configure the env vars below (ACR_NAME, ACCOUNT_NAME, etc.) for your project.
#
# Deployment triggers:
#   Push to main                    → dev
#   GitHub Release published        → prod
#   workflow_dispatch               → environment selected by user
#   repository_dispatch (infra_provisioned) → environment from payload

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | staging | prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

# Container deployment settings (used by deploy-hosted-agent job).
# Update these values for your project before enabling that job.
# AGENT_NAME uses a "BusinessInfinity-<repo>" convention; adjust the prefix as needed.
env:
  AGENT_NAME: "BusinessInfinity-${{ github.event.repository.name }}"
  ACR_NAME: "your-acr-name"
  ACCOUNT_NAME: "your-foundry-account"
  PROJECT_NAME: "your-foundry-project"
  RG_NAME: "your-resource-group"
  AGENT_VERSION: "1"

jobs:
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy-hosted-agent:
    name: Build, Push & Deploy Hosted Agent
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push Image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.AGENT_NAME }}:${{ github.sha }} \
            --platform linux/amd64 .

      - name: Create new agent version in Foundry
        run: |
          az cognitiveservices agent create-version \
            --account-name ${{ env.ACCOUNT_NAME }} \
            --project-name ${{ env.PROJECT_NAME }} \
            --name ${{ env.AGENT_NAME }} \
            --image "${{ env.ACR_NAME }}.azurecr.io/${{ env.AGENT_NAME }}:${{ github.sha }}" \
            --agent-version ${{ env.AGENT_VERSION }}

      - name: Start the agent deployment
        run: |
          az cognitiveservices agent start \
            --account-name ${{ env.ACCOUNT_NAME }} \
            --project-name ${{ env.PROJECT_NAME }} \
            --name ${{ env.AGENT_NAME }} \
            --agent-version ${{ env.AGENT_VERSION }} \
            --min-replicas 1 \
            --max-replicas 2
