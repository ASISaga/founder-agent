name: Deploy Founder Agent to Foundry

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ACR image tag to deploy (default: latest)"
        required: false
        default: "latest"
      agent_name:
        description: "Foundry agent name (default: Founder)"
        required: false
        default: "Founder"
      dry_run:
        description: "Dry run - resolve digest and validate without deploying"
        required: false
        default: "false"

concurrency:
  group: deploy-founder-foundry
  cancel-in-progress: false

env:
  IMAGE_REPO: aos/founder-agent

jobs:
  deploy:
    name: Deploy to Foundry Agent Service
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image digest
        id: image
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          DIGEST=$(az acr manifest list-metadata \
            --registry ${{ vars.ACR_NAME }} \
            --name ${{ env.IMAGE_REPO }} \
            --orderby time_desc \
            --query "[?tags[?@ == '${TAG}']].digest | [0]" \
            --output tsv)
          if [ -z "${DIGEST}" ]; then
            echo "::error::No manifest found for ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:${TAG}"
            exit 1
          fi
          IMAGE_REF="${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}@${DIGEST}"
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "Resolved: ${IMAGE_REF}"

      - name: Ensure capability host
        run: |
          az rest --method put \
            --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.RG_NAME }}/providers/Microsoft.CognitiveServices/accounts/${{ vars.FOUNDRY_HUB_NAME }}/capabilityHosts/accountcaphost?api-version=2025-10-01-preview" \
            --headers "content-type=application/json" \
            --body '{"properties":{"capabilityHostKind":"Agents","enablePublicHostingEnvironment":true}}' \
            --output none
          echo "Capability host ensured"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK
        run: pip install --pre "azure-ai-projects>=2.0.0b4" azure-identity --quiet

      - name: Deploy to Foundry
        if: inputs.dry_run != 'true'
        id: deploy
        env:
          AZURE_AI_PROJECT_ENDPOINT: "https://${{ vars.FOUNDRY_HUB_NAME }}.services.ai.azure.com/api/projects/${{ vars.FOUNDRY_PROJECT_NAME }}"
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          AGENT_NAME: ${{ inputs.agent_name || 'Founder' }}
        run: python .github/scripts/deploy_founder.py

      - name: Dry run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "DRY RUN - no deployment made"
          echo "Agent:   ${{ inputs.agent_name || 'Founder' }}"
          echo "Image:   ${{ steps.image.outputs.image_ref }}"
          echo "Foundry: https://${{ vars.FOUNDRY_HUB_NAME }}.services.ai.azure.com/api/projects/${{ vars.FOUNDRY_PROJECT_NAME }}"

      - name: Verify deployment
        if: inputs.dry_run != 'true'
        run: |
          az extension add --name cognitiveservices --upgrade --yes
          az cognitiveservices agent show \
            --account-name ${{ vars.FOUNDRY_HUB_NAME }} \
            --project-name ${{ vars.FOUNDRY_PROJECT_NAME }} \
            --name "${{ inputs.agent_name || 'Founder' }}" \
            --output table

      - name: Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Founder Agent - Foundry Deployment
          | | |
          |--|--|
          | **Agent name** | ${{ inputs.agent_name || 'Founder' }} |
          | **Image** | ${{ steps.image.outputs.image_ref }} |
          | **Agent version** | ${{ steps.deploy.outputs.agent_version || 'n/a' }} |
          | **Status** | ${{ steps.deploy.outputs.agent_status || 'n/a' }} |
          | **Foundry project** | ${{ vars.FOUNDRY_PROJECT_NAME }} |
          | **Dry run** | ${{ inputs.dry_run || 'false' }} |
          EOF
