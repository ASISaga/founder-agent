name: Deploy Founder Agent from ACR

# Deploys the Founder agent to Azure AI Foundry using an EXISTING container image.
#
# Job — deploy-hosted-agent (Azure CLI):
#   Pulls the identified image from ACR and creates/starts the agent in Foundry.

on:
#  push:
#    branches:
#      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | staging | prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

env:
  # Using repository name directly for the image name to match build logs
  AGENT_NAME: "boardroom-founder-agent" 
  ACR_NAME: ${{ vars.ACR_NAME }}
  FOUNDRY_HUB_NAME: ${{ vars.FOUNDRY_HUB_NAME }}
  FOUNDRY_PROJECT_NAME: ${{ vars.FOUNDRY_PROJECT_NAME }}
  RG_NAME: ${{ vars.RG_NAME }}
  AGENT_VERSION: ${{ vars.AGENT_VERSION }}

jobs:
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  deploy-hosted-agent:
    name: Deploy Hosted Agent from Registry
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        id: validate-config
        run: |
          missing=()
          [[ -z "$AZURE_CLIENT_ID" ]]       && missing+=("AZURE_CLIENT_ID secret")
          [[ -z "$AZURE_TENANT_ID" ]]       && missing+=("AZURE_TENANT_ID secret")
          [[ -z "$AZURE_SUBSCRIPTION_ID" ]] && missing+=("AZURE_SUBSCRIPTION_ID secret")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Deployment skipped — missing: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (OIDC)
        if: steps.validate-config.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify and Set Image Tag
        if: steps.validate-config.outputs.configured == 'true'
        run: |
          # Use the exact SHA associated with this run
          IMAGE_TAG="${{ github.sha }}"
          echo "Verifying image: ${{ env.ACR_NAME }}.azurecr.io/${{ env.AGENT_NAME }}:$IMAGE_TAG"
          
          # Use tsv output to avoid formatting issues during grep
          TAG_EXISTS=$(az acr repository show-tags --name ${{ env.ACR_NAME }} --repository ${{ env.AGENT_NAME }} --output tsv | grep "$IMAGE_TAG" || echo "NOT_FOUND")
          
          if [ "$TAG_EXISTS" == "NOT_FOUND" ]; then
            echo "::error::Image tag $IMAGE_TAG not found in ACR. Deployment halted."
            exit 1
          fi
          
          # Set for subsequent steps
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "::info::Successfully verified image in registry."

      - name: Set up Python
        if: steps.validate-config.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Azure AI SDK
        if: steps.validate-config.outputs.configured == 'true'
        run: pip install azure-ai-projects azure-identity

      - name: Deploy agent to Foundry
        if: steps.validate-config.outputs.configured == 'true'
        env:
          FOUNDRY_HUB_NAME:     ${{ env.FOUNDRY_HUB_NAME }}
          FOUNDRY_PROJECT_NAME: ${{ env.FOUNDRY_PROJECT_NAME }}
          AGENT_NAME:           ${{ env.AGENT_NAME }}
          ACR_NAME:             ${{ env.ACR_NAME }}
          IMAGE_TAG:            ${{ env.IMAGE_TAG }}
          AGENT_VERSION:        ${{ env.AGENT_VERSION }}
        run: python .github/scripts/deploy_agent.py
