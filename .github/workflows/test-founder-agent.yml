name: Test Founder Agent

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Foundry agent name to test"
        required: false
        default: "Founder"
      agent_version:
        description: "Agent version to test"
        required: false
        default: "1"
      inspect_only:
        description: "Run diagnostic inspection only, skip tests"
        required: false
        default: "false"
concurrency:
  group: test-founder-agent
  cancel-in-progress: false

jobs:
  test:
    name: Integration Test
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25


    permissions:
      id-token: write
      contents: read

    env:
      AZURE_AI_PROJECT_ENDPOINT: "https://${{ vars.FOUNDRY_HUB_NAME }}.services.ai.azure.com/api/projects/${{ vars.FOUNDRY_PROJECT_NAME }}"
      AGENT_NAME: ${{ inputs.agent_name || 'Founder' }}
      AGENT_VERSION: ${{ inputs.agent_version || '1' }}
      COLD_START_TIMEOUT: "120"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK
        run: pip install "azure-ai-projects>=2.1.0" azure-identity requests --quiet

      - name: Inspect agent (diagnostic)
        run: python .github/scripts/inspect_agent.py

      - name: Check container status (diagnostic)
        run: |
          python - << 'EOF'
          import os, requests
          from azure.identity import DefaultAzureCredential

          endpoint = os.environ["AZURE_AI_PROJECT_ENDPOINT"]
          agent    = os.environ["AGENT_NAME"]
          version  = os.environ["AGENT_VERSION"]

          token = DefaultAzureCredential().get_token("https://ai.azure.com/.default").token
          headers = {
              "Authorization": f"Bearer {token}",
              "Foundry-Features": "HostedAgents=V1Preview",
          }

          for label, path in [
              ("Container status", f"agents/{agent}/versions/{version}/containers/default"),
              ("Container ops",    f"agents/{agent}/versions/{version}/containers/default/operations"),
          ]:
              url = f"{endpoint}/{path}?api-version=v1"
              r = requests.get(url, headers=headers, timeout=30)
              print(f"\n=== {label} === HTTP {r.status_code}")
              print(r.text[:800])
          EOF

      - name: Start agent deployment
        if: inputs.inspect_only != 'true'
        env:
          START_TIMEOUT: "300"
        run: python .github/scripts/start_agent.py

      - name: Run integration tests
        if: inputs.inspect_only != 'true'
        id: test
        run: python .github/scripts/test_founder.py

      - name: Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          | | |
          |--|--|
          | **Agent** | ${{ inputs.agent_name || 'Founder' }} v${{ inputs.agent_version || '1' }} |
          | **Passed** | ${{ steps.test.outputs.passed || 'n/a' }} |
          | **Failed** | ${{ steps.test.outputs.failed || 'n/a' }} |
          EOF
